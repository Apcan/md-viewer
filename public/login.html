<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer - 登录</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: 32px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }
    .error-msg {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
      font-size: 13px;
      text-align: center;
    }
    .btn-login {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover {
      background: var(--accent-hover);
    }
    .btn-login:active {
      transform: scale(0.98);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
    }
    @media (max-width: 600px) {
      body { padding: 16px; padding-top: 72px; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">MD Viewer</a>
    <button class="icon-btn" id="themeToggle" title="切换主题"></button>
  </nav>

  <div class="card">
    <div class="card-title">登录 MD Viewer</div>

    <form id="loginForm">
      <div class="form-group">
        <input type="password" id="password" placeholder="输入访问密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登录</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="hint">忘记密码？请联系管理员</div>
  </div>

  <script src="/js/theme.js"></script>
  <script>
    // --- Auto-login with saved password ---
    (async function() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (!data.required) {
          window.location.href = '/';
          return;
        }
        // Try auto-login with saved password
        const savedPassword = localStorage.getItem('md-viewer-password');
        if (savedPassword && !data.authenticated) {
          const loginRes = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: savedPassword })
          });
          const loginData = await loginRes.json();
          if (loginData.success) {
            window.location.href = '/';
            return;
          }
          // Saved password is wrong, clear it
          localStorage.removeItem('md-viewer-password');
        } else if (data.authenticated) {
          window.location.href = '/';
        }
      } catch (e) {
        // Stay on page and let user try
      }
    })();

    // --- Login form ---
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const password = passwordInput.value.trim();
      if (!password) {
        showError('请输入密码');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.success) {
          // Save password to localStorage for auto-login
          localStorage.setItem('md-viewer-password', password);
          window.location.href = '/';
        } else {
          showError(data.error || '密码错误，请重试');
          passwordInput.value = '';
          passwordInput.focus();
        }
      } catch (err) {
        showError('登录失败: ' + err.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    });

    // Enter key already handled by form submit, but ensure focus on load
    passwordInput.focus();
  </script>
</body>
</html>
