<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer - 文档列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --bg: oklch(0.995 0.002 80);
      --bg-card: oklch(0.975 0.005 80);
      --text: oklch(0.17 0.02 260);
      --text-secondary: oklch(0.48 0.015 260);
      --accent: oklch(0.55 0.2 265);
      --accent-hover: oklch(0.48 0.2 265);
      --border: oklch(0.91 0.008 80);
      --shadow: 0 1px 3px oklch(0.2 0 0 / 0.06), 0 1px 2px oklch(0.2 0 0 / 0.04);
      --shadow-lg: 0 4px 12px oklch(0.2 0 0 / 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --danger: oklch(0.58 0.22 25);
      --danger-hover: oklch(0.5 0.22 25);
      --success: oklch(0.65 0.17 155);
      --tab-hover-bg: oklch(0.55 0.2 265 / 0.06);
    }
    html.dark {
      --bg: oklch(0.15 0.015 260);
      --bg-card: oklch(0.2 0.015 260);
      --text: oklch(0.88 0.01 260);
      --text-secondary: oklch(0.62 0.015 260);
      --accent: oklch(0.7 0.15 265);
      --accent-hover: oklch(0.6 0.18 265);
      --border: oklch(0.28 0.015 260);
      --shadow: 0 1px 3px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 4px 12px oklch(0 0 0 / 0.4);
      --tab-hover-bg: oklch(0.7 0.15 265 / 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    /* --- Navbar --- */
    .navbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.2s, border-color 0.2s;
    }
    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover {
      background: var(--bg-card);
      color: var(--text);
    }
    /* --- Main content --- */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    /* --- Tab bar --- */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
      position: sticky;
      top: 52px;
      z-index: 90;
      background: var(--bg);
      transition: background 0.2s;
      height: 44px;
      border-bottom: 1px solid var(--border);
    }
    .tab-bar-inner {
      display: flex;
      align-items: center;
      position: relative;
      height: 100%;
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar-inner::-webkit-scrollbar { display: none; }
    .tab-item {
      padding: 0 16px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: color 0.2s;
      position: relative;
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .tab-item:hover {
      color: var(--text);
    }
    .tab-item.active {
      color: var(--accent);
      font-weight: 600;
    }
    .tab-underline {
      position: absolute;
      bottom: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      transition: left 0.25s cubic-bezier(0.16, 1, 0.3, 1), width 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tab-item .tab-count {
      font-size: 11px;
      opacity: 0.6;
      margin-left: 4px;
      font-weight: 400;
    }
    .tab-add {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      margin-left: 4px;
    }
    .tab-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--tab-hover-bg);
    }
    /* --- Tab context menu --- */
    .tab-context-menu {
      position: fixed;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      z-index: 300;
      min-width: 120px;
      padding: 4px;
      display: none;
    }
    .tab-context-menu.show { display: block; }
    .tab-context-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
    }
    .tab-context-menu button:hover {
      background: var(--bg-card);
    }
    .tab-context-menu button.danger {
      color: var(--danger);
    }
    /* --- Search bar --- */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-input {
      padding: 6px 12px 6px 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-sans);
      outline: none;
      width: 180px;
      transition: border-color 0.15s, width 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      width: 240px;
    }
    .search-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
      pointer-events: none;
    }
    .search-wrap { position: relative; }
    .search-clear {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 50%;
      font-size: 12px;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .search-clear.show { display: flex; }
    .search-clear:hover { background: var(--tab-hover-bg); color: var(--text); }
    @media (max-width: 600px) { .search-input { width: 120px; } .search-input:focus { width: 160px; } }

    /* --- Doc count --- */
    .doc-count-bar {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      padding-right: 16px;
      flex-shrink: 0;
    }
    /* --- Recent views --- */
    .recent-section {
      margin-bottom: 16px;
    }
    .recent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
    }
    .recent-header:hover { opacity: 0.8; }
    .recent-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .recent-arrow {
      font-size: 12px;
      color: var(--text-secondary);
      transition: transform 0.2s;
    }
    .recent-arrow.open { transform: rotate(90deg); }
    .recent-list {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .recent-list.open { display: flex; }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      color: var(--text);
    }
    .recent-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }
    .recent-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-item-cat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px 2px 6px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .recent-item-cat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .recent-item-time {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    /* --- Doc grid --- */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    /* --- Doc card --- */
    .doc-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .doc-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .doc-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.15s;
    }
    .doc-card-name:hover {
      color: var(--accent);
    }
    .doc-card-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      margin-top: 2px;
      width: fit-content;
      letter-spacing: 0.01em;
    }
    .doc-card-cat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .doc-card-actions {
      display: flex;
      gap: 6px;
      margin-top: auto;
      padding-top: 12px;
    }
    .doc-card-actions .btn {
      flex: 1;
      padding: 0;
      font-size: 12px;
      font-weight: 500;
      min-height: 32px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .doc-card-actions .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .doc-card-actions .btn:hover {
      border-color: transparent;
    }
    .doc-card-actions .btn:active {
      transform: scale(0.96);
    }
    .doc-card-actions .btn.btn-preview {
      color: var(--accent);
      border-color: oklch(0.55 0.2 265 / 0.15);
      background: oklch(0.55 0.2 265 / 0.05);
    }
    .doc-card-actions .btn.btn-preview:hover {
      background: oklch(0.55 0.2 265 / 0.12);
      border-color: oklch(0.55 0.2 265 / 0.3);
      color: var(--accent-hover);
    }
    .doc-card-actions .btn.btn-edit {
      color: var(--text-secondary);
    }
    .doc-card-actions .btn.btn-edit:hover {
      background: var(--tab-hover-bg);
      color: var(--text);
    }
    .doc-card-actions .btn.btn-delete {
      color: oklch(0.58 0.22 25 / 0.7);
      border-color: oklch(0.58 0.22 25 / 0.1);
      background: oklch(0.58 0.22 25 / 0.03);
    }
    .doc-card-actions .btn.btn-delete:hover {
      background: oklch(0.58 0.22 25 / 0.08);
      border-color: oklch(0.58 0.22 25 / 0.25);
      color: var(--danger);
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      min-height: 34px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(239,68,68,0.08);
      border-color: var(--danger);
    }
    /* --- Empty state --- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      grid-column: 1/-1;
    }
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state-text {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .empty-state-hint {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }
    .empty-state .btn-primary {
      padding: 10px 24px;
      font-size: 14px;
    }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); grid-column: 1/-1; }
    /* --- Focus visible --- */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }
    /* --- Skeleton loading --- */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .sk-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }
    .sk-line {
      height: 12px;
      border-radius: 6px;
      background: var(--border);
      margin-bottom: 10px;
      animation: skPulse 1.5s ease-in-out infinite;
    }
    .sk-line.w60 { width: 60%; }
    .sk-line.w40 { width: 40%; height: 10px; }
    .sk-line.w80 { width: 80%; }
    .sk-pill {
      width: 48px;
      height: 18px;
      border-radius: 999px;
      background: var(--border);
      margin-bottom: 12px;
      animation: skPulse 1.5s ease-in-out infinite;
    }
    @keyframes skPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @media (max-width: 600px) { .skeleton-grid { grid-template-columns: 1fr; } }
    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.active .modal {
      transform: scale(1);
    }
    .modal-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover {
      background: var(--bg-card);
    }
    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .modal-add-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-add-row input:focus {
      border-color: var(--accent);
    }
    .modal-add-row button {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .modal-add-row button:hover {
      background: var(--accent-hover);
    }
    /* --- Category select modal (for editing doc category) --- */
    .cat-select-list {
      list-style: none;
    }
    .cat-select-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      gap: 10px;
      transition: background 0.1s;
    }
    .cat-select-item:hover {
      background: var(--tab-hover-bg);
    }
    .cat-select-item.selected {
      background: rgba(99,102,241,0.1);
      color: var(--accent);
      font-weight: 600;
    }
    .cat-select-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-select-check {
      margin-left: auto;
      opacity: 0;
      font-size: 14px;
      color: var(--accent);
    }
    .cat-select-item.selected .cat-select-check {
      opacity: 1;
    }
    /* --- Edit modal permission section --- */
    .edit-modal-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .edit-modal-section-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .permission-options {
      display: flex;
      gap: 8px;
    }
    .perm-option {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      user-select: none;
    }
    .perm-option:has(input:checked) {
      border-color: var(--accent);
      background: rgba(99,102,241,0.05);
      color: var(--accent);
      font-weight: 500;
    }
    .perm-option input {
      display: none;
    }
    .edit-modal-perm-wrap {
      display: none;
      margin-top: 12px;
    }
    .edit-modal-perm-wrap input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .edit-modal-perm-wrap input:focus {
      border-color: var(--accent);
    }
    .edit-modal-perm-wrap input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }
    .edit-modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    /* --- Cat list in manage modal --- */
    .cat-list {
      list-style: none;
    }
    .cat-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-item-name {
      flex: 1;
      font-size: 14px;
    }
    .cat-item-actions {
      display: flex;
      gap: 4px;
    }
    .cat-item-actions button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-item-actions button:hover {
      background: var(--bg-card);
      color: var(--text);
    }
    .cat-item-actions button.delete:hover {
      color: var(--danger);
      background: rgba(239,68,68,0.08);
    }
    .cat-edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    /* --- Quick create category popup --- */
    .quick-create-popup {
      position: fixed;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 300;
      padding: 16px;
      width: 280px;
      display: none;
    }
    .quick-create-popup.show { display: block; }
    .quick-create-popup h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .quick-create-popup input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .quick-create-popup input:focus { border-color: var(--accent); }
    .quick-create-popup .popup-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .quick-create-popup .popup-actions button {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      transition: all 0.15s;
    }
    .quick-create-popup .popup-actions button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .quick-create-popup .popup-actions button.primary:hover {
      background: var(--accent-hover);
    }
    /* --- Doc list fade-in --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .doc-grid.fade-in {
      animation: fadeInUp 0.3s ease-out;
    }
    /* --- Responsive --- */
    @media (max-width: 768px) {
      .doc-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }
    @media (max-width: 600px) {
      .navbar { padding: 0 12px; }
      .main-content { padding: 0 12px 32px; }
      .tab-bar { top: 52px; }
      .tab-item { padding: 0 12px; font-size: 13px; }
      .doc-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .doc-card-actions { flex-wrap: wrap; }
      .recent-item-cat { display: none; }
      .modal { width: 95%; max-height: 90vh; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media print {
      .navbar, .tab-bar, .recent-section, .doc-card-actions { display: none !important; }
      .doc-grid { display: block; }
      .doc-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; margin-bottom: 12px; }
      body { background: white; }
    }

    /* --- Star button --- */
    .doc-card-star {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      color: var(--text-secondary);
      transition: color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .doc-card-star:hover { transform: scale(1.15); }
    .doc-card-star.starred { color: oklch(0.75 0.18 85); }

    /* --- Copy link button --- */
    .doc-card-copy {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: all 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .doc-card-copy:hover { background: var(--tab-hover-bg); color: var(--text); }
    .doc-card-copy.copied { color: var(--success); }

    /* --- Card header row --- */
    .doc-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .doc-card-header .doc-card-name { flex: 1; min-width: 0; }

    /* --- Description --- */
    .doc-card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      opacity: 0.8;
    }

    /* --- Tag pills --- */
    .doc-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .doc-card-tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px 1px 5px;
      border-radius: 999px;
      white-space: nowrap;
      line-height: 1.6;
    }
    .doc-card-tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- Meta row --- */
    .doc-card-meta {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* --- Drag states --- */
    .doc-card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }
    .doc-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px oklch(0.55 0.2 265 / 0.2);
    }

    /* --- Tag management button --- */
    .tag-mgmt-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      margin-left: 4px;
    }
    .tag-mgmt-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--tab-hover-bg);
    }

    /* --- Tag filter bar --- */
    .tag-filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 0 6px;
      flex-wrap: wrap;
    }
    .tag-filter-bar:empty { display: none; }
    .tag-filter-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-right: 2px;
    }
    .tag-filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px 3px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      color: var(--text-secondary);
    }
    .tag-filter-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tag-filter-pill.active {
      border-color: var(--accent);
      color: #fff;
    }
    .tag-filter-pill .tag-filter-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- Tag management modal --- */
    .tag-mgmt-list {
      list-style: none;
    }
    .tag-mgmt-item {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .tag-mgmt-item:last-child { border-bottom: none; }
    .tag-mgmt-item-name { flex: 1; font-size: 14px; }
    .tag-mgmt-item-count { font-size: 11px; color: var(--text-secondary); }
    .tag-mgmt-item-actions {
      display: flex;
      gap: 4px;
    }
    .tag-mgmt-item-actions button {
      width: 28px; height: 28px; border: none; background: transparent;
      color: var(--text-secondary); cursor: pointer; border-radius: 6px;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
    }
    .tag-mgmt-item-actions button:hover { background: var(--bg-card); color: var(--text); }
    .tag-mgmt-item-actions button.delete:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .tag-color-input {
      width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; padding: 3px; background: var(--bg); flex-shrink: 0;
      -webkit-appearance: none; appearance: none;
    }
    .tag-color-input::-webkit-color-swatch-wrapper { padding: 0; }
    .tag-color-input::-webkit-color-swatch { border: none; border-radius: 4px; }
    .tag-color-input::-moz-color-swatch { border: none; border-radius: 4px; }
    .tag-edit-input {
      flex: 1; padding: 6px 10px; border: 1px solid var(--accent); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: 14px; outline: none;
    }

    /* --- Tags checkbox in edit modal --- */
    .tag-checkbox-list {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .tag-checkbox-item {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px;
      cursor: pointer; font-size: 12px; transition: all 0.15s; user-select: none;
    }
    .tag-checkbox-item:has(input:checked) {
      border-color: var(--accent); background: rgba(99,102,241,0.08); color: var(--accent);
    }
    .tag-checkbox-item input { display: none; }
    .tag-checkbox-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }

    /* --- Inline rename input --- */
    .doc-card-name-input {
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-sans);
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent);
      outline: none;
      width: 100%;
      padding: 2px 0;
      line-height: 1.4;
    }
    .doc-card-name-input:focus {
      border-bottom-color: var(--accent-hover);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">MD Viewer</a>
    <div class="navbar-actions">
      <button class="icon-btn" id="themeToggle" title="切换主题"></button>
      <a href="/upload" class="icon-btn" title="上传" style="text-decoration:none">+</a>
      <button class="icon-btn" id="logoutBtn" title="登出" style="font-size:14px">⏻</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="tab-bar" id="tabBar">
      <div class="tab-bar-inner" id="tabBarInner">
        <button class="tab-item active" data-id="">全部</button>
        <div class="tab-underline" id="tabUnderline"></div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索文档...">
        <button class="search-clear" id="searchClear">&times;</button>
      </div>
      <div class="doc-count-bar" id="docCountBar"></div>
      <button class="tag-mgmt-btn" id="tagMgmtBtn" title="管理标签">🏷</button>
    </div>

    <div class="tag-filter-bar" id="tagFilterBar"></div>

    <div class="recent-section" id="recentSection" style="display:none">
      <div class="recent-header" id="recentHeader">
        <span class="recent-arrow" id="recentArrow">&#9654;</span>
        <h3>最近查看</h3>
      </div>
      <div class="recent-list" id="recentList"></div>
    </div>

    <div class="doc-grid" id="documentsGrid">
      <div class="skeleton-grid">
        <div class="sk-card"><div class="sk-line w60"></div><div class="sk-pill"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-line w60"></div><div class="sk-pill"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-line w60"></div><div class="sk-pill"></div><div class="sk-line w80"></div></div>
        <div class="sk-card"><div class="sk-line w60"></div><div class="sk-pill"></div><div class="sk-line w80"></div></div>
      </div>
    </div>
  </div>

  <!-- Tab context menu -->
  <div class="tab-context-menu" id="tabContextMenu">
    <button id="ctxEdit">编辑分类</button>
    <button class="danger" id="ctxDelete">删除分类</button>
  </div>

  <!-- Quick create category popup -->
  <div class="quick-create-popup" id="quickCreatePopup">
    <h4>创建分类</h4>
    <input type="text" id="quickCatName" placeholder="输入分类名称">
    <div class="popup-actions">
      <button id="quickCatCancel">取消</button>
      <button class="primary" id="quickCatConfirm">创建</button>
    </div>
  </div>

  <!-- Edit document modal (category + permission) -->
  <div class="modal-overlay" id="catSelectModal">
    <div class="modal">
      <div class="modal-header">
        <h3>编辑文档</h3>
        <button class="modal-close" id="catSelectClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="edit-modal-section-label">分类</div>
        <ul class="cat-select-list" id="catSelectList"></ul>

        <hr class="edit-modal-divider">

        <div class="edit-modal-section-label">查看权限</div>
        <div class="permission-options">
          <label class="perm-option">
            <input type="radio" name="editPermRadio" value="public">
            🌐 公开
          </label>
          <label class="perm-option">
            <input type="radio" name="editPermRadio" value="private">
            🔒 私有
          </label>
          <label class="perm-option">
            <input type="radio" name="editPermRadio" value="password">
            🔑 密码查看
          </label>
        </div>
        <div class="edit-modal-perm-wrap" id="editPermPasswordWrap">
          <input type="password" id="editPermPassword" placeholder="输入查看密码">
        </div>

        <hr class="edit-modal-divider">
        <div class="edit-modal-section-label">备注</div>
        <textarea id="editDocDescription" placeholder="添加备注信息（可选）" rows="2" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none;resize:vertical;transition:border-color 0.15s;margin-bottom:8px;"></textarea>

        <hr class="edit-modal-divider">
        <div class="edit-modal-section-label">标签</div>
        <div class="tag-checkbox-list" id="editTagCheckboxes"></div>
      </div>
      <div class="edit-modal-footer">
        <button class="btn" id="editModalCancelBtn">取消</button>
        <button class="btn btn-primary" id="editModalSaveBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Category Management Modal -->
  <div class="modal-overlay" id="catModal">
    <div class="modal">
      <div class="modal-header">
        <h3>管理分类</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-add-row">
          <input type="text" id="newCatName" placeholder="新分类名称">
          <button id="addCatBtn">添加</button>
        </div>
        <ul class="cat-list" id="catList"></ul>
      </div>
    </div>
  </div>

  <!-- Tag Management Modal -->
  <div class="modal-overlay" id="tagModal">
    <div class="modal">
      <div class="modal-header">
        <h3>管理标签</h3>
        <button class="modal-close" id="tagModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-add-row">
          <input type="color" class="tag-color-input" id="newTagColor" value="#6366f1" title="选择颜色">
          <input type="text" id="newTagName" placeholder="新标签名称" style="flex:1">
          <button id="addTagBtn">添加</button>
        </div>
        <ul class="tag-mgmt-list" id="tagList"></ul>
      </div>
    </div>
  </div>

  <script>
    // --- Theme ---
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    function getTheme() {
      const saved = localStorage.getItem('md-viewer-theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      html.classList.toggle('dark', theme === 'dark');
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('md-viewer-theme', theme);
    }

    applyTheme(getTheme());
    themeToggle.addEventListener('click', () => {
      applyTheme(html.classList.contains('dark') ? 'light' : 'dark');
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('md-viewer-theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });

    // --- Logout ---
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      localStorage.removeItem('md-viewer-password');
      await fetch('/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    // --- Data ---
    let categories = [];
    let allDocuments = [];
    let currentCategoryId = '';
    let documentCounts = {};
    let editingDocId = null;
    let allTags = [];
    let currentTagId = '';

    // --- Category colors ---
    const CAT_COLORS = [
      '#6366f1', '#8b5cf6', '#ec4899', '#ef4444', '#f97316',
      '#eab308', '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6'
    ];

    function getCatColor(catId) {
      if (!catId) return CAT_COLORS[0];
      const idx = categories.findIndex(c => c.id === catId);
      return CAT_COLORS[((idx >= 0 ? idx : 0) % CAT_COLORS.length)];
    }

    // --- Search ---
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    let searchQuery = '';
    let searchTimer = null;

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = searchInput.value.trim();
        searchClear.classList.toggle('show', !!searchQuery);
        loadDocuments();
      }, 200);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('show');
      loadDocuments();
    });

    // --- Documents ---
    const documentsGrid = document.getElementById('documentsGrid');
    const docCountBar = document.getElementById('docCountBar');

    async function loadDocuments() {
      try {
        let url = '/api/documents';
        const params = [];
        if (currentCategoryId) params.push('category_id=' + encodeURIComponent(currentCategoryId));
        if (currentTagId) params.push('tag_id=' + encodeURIComponent(currentTagId));
        if (params.length) url += '?' + params.join('&');
        const res = await fetch(url);
        if (res.status === 401) { localStorage.removeItem('md-viewer-password'); window.location.href = '/login'; return; }
        const docs = await res.json();
        allDocuments = docs;

        // Client-side search filter
        const filtered = searchQuery
          ? docs.filter(d => d.original_name.toLowerCase().includes(searchQuery.toLowerCase()))
          : docs;

        docCountBar.textContent = searchQuery
          ? filtered.length + '/' + docs.length + ' 篇文档'
          : '共 ' + docs.length + ' 篇文档';

        if (filtered.length === 0 && !searchQuery) {
          documentsGrid.innerHTML = '<div class="empty-state">' +
            '<div class="empty-state-icon">📝</div>' +
            '<div class="empty-state-text">暂无文档</div>' +
            '<div class="empty-state-hint">点击右上角 + 上传你的第一个 Markdown 文件</div>' +
            '<a href="/upload" class="btn btn-primary" style="text-decoration:none;display:inline-block">上传文档</a>' +
            '</div>';
          return;
        }

        if (filtered.length === 0 && searchQuery) {
          documentsGrid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">没有找到「' + searchQuery + '」相关的文档</div></div>';
          return;
        }

        const catMap = {};
        categories.forEach(c => { catMap[c.id] = c.name; });

        documentsGrid.innerHTML = filtered.map(doc => {
          const catName = catMap[doc.category_id] || '未分类';
          const catColor = getCatColor(doc.category_id);
          const permIcon = doc.view_permission === 'private' ? ' 🔒' : doc.view_permission === 'password' ? ' 🔑' : '';
          const starClass = doc.starred ? ' starred' : '';
          const starChar = doc.starred ? '★' : '☆';
          const desc = doc.description ? '<div class="doc-card-desc">' + escapeHtml(doc.description) + '</div>' : '';
          const tagPills = (doc.tags && doc.tags.length > 0)
            ? '<div class="doc-card-tags">' + doc.tags.map(t =>
                '<span class="doc-card-tag-pill" style="background:' + t.color + '15;color:' + t.color + '"><span class="doc-card-tag-dot" style="background:' + t.color + '"></span>' + escapeHtml(t.name) + '</span>'
              ).join('') + '</div>'
            : '';
          const meta = '<div class="doc-card-meta">' + (doc.word_count || 0) + ' 字 · 约 ' + (doc.reading_time || 1) + ' 分钟</div>';
          return '<div class="doc-card" draggable="' + (!searchQuery) + '" data-id="' + doc.id + '">' +
            '<div class="doc-card-header">' +
            '<button class="doc-card-star' + starClass + '" onclick="toggleStar(\'' + doc.id + '\', this)" title="收藏">' + starChar + '</button>' +
            '<div class="doc-card-name" data-doc-id="' + doc.id + '">' + escapeHtml(doc.original_name) + '</div>' +
            '<button class="doc-card-copy" onclick="copyLink(\'' + doc.id + '\', this)" title="复制链接">🔗</button>' +
            '</div>' +
            desc +
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
            '<div class="doc-card-cat-pill" style="background:' + catColor + '12;color:' + catColor + '">' +
            '<span class="doc-card-cat-dot" style="background:' + catColor + '"></span>' +
            escapeHtml(catName) + permIcon + '</div>' +
            tagPills +
            '</div>' +
            meta +
            '<div class="doc-card-actions">' +
            '<button class="btn btn-edit" onclick="openCatSelect(\'' + doc.id + '\')" title="编辑"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"/><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"/></svg>编辑</button>' +
            '<button class="btn btn-delete" onclick="deleteDoc(\'' + doc.id + '\')" title="删除"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"/></svg>删除</button>' +
            '</div></div>';
        }).join('');

        documentsGrid.classList.remove('fade-in');
        void documentsGrid.offsetWidth;
        documentsGrid.classList.add('fade-in');

        // Bind drag events
        if (!searchQuery) {
          documentsGrid.querySelectorAll('.doc-card[draggable="true"]').forEach(card => {
            card.addEventListener('dragstart', (e) => {
              e.dataTransfer.setData('text/plain', card.dataset.id);
              e.dataTransfer.effectAllowed = 'move';
              card.classList.add('dragging');
            });
            card.addEventListener('dragend', () => card.classList.remove('dragging'));
            card.addEventListener('dragover', (e) => {
              e.preventDefault();
              e.dataTransfer.dropEffect = 'move';
              card.classList.add('drag-over');
            });
            card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
            card.addEventListener('drop', async (e) => {
              e.preventDefault();
              card.classList.remove('drag-over');
              const draggedId = e.dataTransfer.getData('text/plain');
              const targetId = card.dataset.id;
              if (draggedId === targetId) return;
              // Reorder: move dragged item to target position
              const ids = filtered.map(d => d.id);
              const fromIdx = ids.indexOf(draggedId);
              const toIdx = ids.indexOf(targetId);
              if (fromIdx === -1 || toIdx === -1) return;
              ids.splice(fromIdx, 1);
              ids.splice(toIdx, 0, draggedId);
              try {
                await fetch('/api/documents/sort', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ ordered_ids: ids })
                });
                await loadDocuments();
              } catch (err) { console.error('Sort failed:', err); }
            });
          });
        }
      } catch (err) {
        documentsGrid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">加载失败，请刷新重试</div></div>';
      }
    }

    function viewDoc(id) { window.location.href = '/view/' + id; }

    // --- Inline rename on double-click ---
    const clickTimers = {};

    documentsGrid.addEventListener('click', (e) => {
      const nameEl = e.target.closest('.doc-card-name');
      if (!nameEl) return;
      const docId = nameEl.dataset.docId;
      if (!docId) return;

      // If already in edit mode, do nothing
      if (nameEl.querySelector('input')) return;

      // Clear existing timer for this doc
      if (clickTimers[docId]) {
        clearTimeout(clickTimers[docId]);
        clickTimers[docId] = null;
        // This is a double-click → enter edit mode
        startRename(docId, nameEl);
        return;
      }

      // Single click: wait 200ms to see if double-click follows
      clickTimers[docId] = setTimeout(() => {
        clickTimers[docId] = null;
        viewDoc(docId);
      }, 200);
    });

    function startRename(docId, nameEl) {
      const doc = allDocuments.find(d => d.id === docId);
      if (!doc) return;

      const currentName = doc.original_name;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'doc-card-name-input';
      input.value = currentName;

      nameEl.textContent = '';
      nameEl.appendChild(input);
      input.focus();
      input.select();

      let saved = false;

      async function saveRename() {
        if (saved) return;
        const newName = input.value.trim();
        if (!newName || newName === currentName) {
          nameEl.textContent = currentName;
          return;
        }
        saved = true;
        try {
          const res = await fetch('/api/documents/' + docId + '/rename', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ original_name: newName })
          });
          const data = await res.json();
          if (data.success) {
            nameEl.textContent = newName;
            doc.original_name = newName;
            showToast('文件名已更新');
          } else {
            nameEl.textContent = currentName;
            showToast('重命名失败: ' + data.error);
          }
        } catch (err) {
          nameEl.textContent = currentName;
          showToast('重命名失败');
        }
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveRename();
        } else if (e.key === 'Escape') {
          saved = true;
          nameEl.textContent = currentName;
        }
      });

      input.addEventListener('blur', saveRename);
    }

    async function deleteDoc(id) {

      try {
        const res = await fetch('/api/documents/' + id, { method: 'DELETE' });

      } catch (err) {

        const data = await res.json();
        if (data.success) {
          btn.textContent = data.starred ? '★' : '☆';

    async function copyLink(id, btn) {
      const url = window.location.origin + '/view/' + id;
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = '✓';
        btn.classList.add('copied');
        showToast('链接已复制');
        setTimeout(() => { btn.textContent = '🔗'; btn.classList.remove('copied'); }, 1500);
      } catch (err) {
        // Fallback: textarea + execCommand
        const textarea = document.createElement('textarea');
        textarea.value = url;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          btn.textContent = '✓';
          btn.classList.add('copied');
          showToast('链接已复制');
          setTimeout(() => { btn.textContent = '🔗'; btn.classList.remove('copied'); }, 1500);
        } catch (e) {
          showToast('复制失败，请手动复制');
        }
        document.body.removeChild(textarea);
      }
    }

    // --- Toast ---
    function showToast(msg) {
      let toast = document.getElementById('appToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'appToast';
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--text);color:var(--bg);border-radius:8px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // --- Tab rendering ---
    const tabBar = document.getElementById('tabBar');
    const tabBarInner = document.getElementById('tabBarInner');
    const tabUnderline = document.getElementById('tabUnderline');

    function updateUnderline() {
      const activeTab = tabBarInner.querySelector('.tab-item.active');
      if (!activeTab) { tabUnderline.style.width = '0'; return; }
      const innerRect = tabBarInner.getBoundingClientRect();
      const tabRect = activeTab.getBoundingClientRect();
      tabUnderline.style.left = (tabRect.left - innerRect.left) + 'px';
      tabUnderline.style.width = tabRect.width + 'px';
    }

    function renderTabs() {
      const uncategorized = categories.find(c => c.name === '未分类');
      const otherCats = categories.filter(c => c.name !== '未分类');

      let html = '<button class="tab-item' + (currentCategoryId === '' ? ' active' : '') + '" data-id="">全部</button>';

      otherCats.forEach(c => {
        const isActive = currentCategoryId === c.id;
        html += '<button class="tab-item' + (isActive ? ' active' : '') + '" data-id="' + c.id + '">' +
          escapeHtml(c.name) + '</button>';
      });

      if (uncategorized) {
        const isActive = currentCategoryId === uncategorized.id;
        html += '<button class="tab-item' + (isActive ? ' active' : '') + '" data-id="' + uncategorized.id + '">' +
          escapeHtml(uncategorized.name) + '</button>';
      }

      html += '<button class="tab-add" id="tabAddBtn" title="创建分类">+</button>';
      tabBarInner.innerHTML = html + '<div class="tab-underline" id="tabUnderline"></div>';

      // Re-query after innerHTML change
      const underline = document.getElementById('tabUnderline');

      // Bind tab events
      tabBarInner.querySelectorAll('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
          saveScrollPosition();
          currentCategoryId = btn.dataset.id;
          renderTabs();
          loadDocuments();
          restoreScrollPosition();
        });

        // Right-click context menu
        btn.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const catId = btn.dataset.id;
          if (!catId) return;
          showTabContextMenu(e.clientX, e.clientY, catId);
        });

        // Long press for mobile
        let longPressTimer = null;
        btn.addEventListener('touchstart', (e) => {
          const catId = btn.dataset.id;
          if (!catId) return;
          longPressTimer = setTimeout(() => {
            e.preventDefault();
            showTabContextMenu(
              e.touches[0].clientX,
              e.touches[0].clientY,
              catId
            );
          }, 600);
        });
        btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
        btn.addEventListener('touchmove', () => clearTimeout(longPressTimer));
      });

      // "+" button
      const addBtn = document.getElementById('tabAddBtn');
      if (addBtn) {
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showQuickCreate(e.target);
        });
      }

      // Position underline
      requestAnimationFrame(() => {
        const activeTab = tabBarInner.querySelector('.tab-item.active');
        if (!activeTab || !underline) return;
        const innerRect = tabBarInner.getBoundingClientRect();
        const tabRect = activeTab.getBoundingClientRect();
        underline.style.left = (tabRect.left - innerRect.left) + 'px';
        underline.style.width = tabRect.width + 'px';
      });
    }

    async function addCategory() {
      const name = newCatName.value.trim();
      if (!name) return;
      try {
        const res = await fetch('/api/categories', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (data.success) {
          newCatName.value = '';
          await loadCategories();
          renderCatList();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('添加失败: ' + err.message);
      }
    }

    function renderCatList() {
      catList.innerHTML = categories.map(c => {
        const isDefault = c.name === '未分类';
        return '<li class="cat-item" data-id="' + c.id + '">' +
          '<span class="cat-item-name" id="cat-name-' + c.id + '">' + escapeHtml(c.name) + '</span>' +
          '<div class="cat-item-actions">' +
          (isDefault ? '' : '<button title="编辑" onclick="startEditCat(\'' + c.id + '\')">✎</button>') +
          (isDefault ? '' : '<button class="delete" title="删除" onclick="deleteCategory(\'' + c.id + '\')">✕</button>') +
          '</div></li>';
      }).join('');
    }

    window.startEditCat = function(id) {
      const nameEl = document.getElementById('cat-name-' + id);
      const cat = categories.find(c => c.id === id);
      if (!cat || !nameEl) return;
      const li = nameEl.closest('.cat-item');
      nameEl.outerHTML = '<input class="cat-edit-input" id="cat-edit-' + id + '" value="' + escapeHtml(cat.name) + '">';
      const editInput = document.getElementById('cat-edit-' + id);
      editInput.focus();
      editInput.select();

      const saveEdit = async () => {
        const newName = editInput.value.trim();
        if (!newName || newName === cat.name) {
          renderCatList();
          return;
        }
        try {
          const res = await fetch('/api/categories/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
          });
          const data = await res.json();
          if (data.success) {
            await loadCategories();
            renderCatList();
          } else {
            alert(data.error);
            renderCatList();
          }
        } catch (err) {
          alert('修改失败: ' + err.message);
          renderCatList();
        }
      };
      editInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') renderCatList(); });
      editInput.addEventListener('blur', saveEdit);
    };

    window.deleteCategory = async function(id) {
      if (!confirm('确定要删除该分类吗？其中的文档将移入"未分类"。')) return;
      try {
        const res = await fetch('/api/categories/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          if (currentCategoryId === id) currentCategoryId = '';
          await loadCategories();
          renderCatList();
          loadDocuments();
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    };

    // --- Recent views ---
    const recentSection = document.getElementById('recentSection');
    const recentHeader = document.getElementById('recentHeader');
    const recentArrow = document.getElementById('recentArrow');
    const recentList = document.getElementById('recentList');

    async function loadRecentViews() {
      try {
        const res = await fetch('/api/recent-views');
        const views = await res.json();
        if (views.length === 0) {
          recentSection.style.display = 'none';
          return;
        }
        recentSection.style.display = 'block';
        recentList.innerHTML = views.slice(0, 5).map(v => {
          const catColor = getCatColor(v.category_id);
          return '<a class="recent-item" href="/view/' + v.id + '">' +
            '<span class="recent-item-name">' + escapeHtml(v.original_name) + '</span>' +
            (v.category_name ? '<span class="recent-item-cat" style="background:' + catColor + '12;color:' + catColor + '"><span class="recent-item-cat-dot" style="background:' + catColor + '"></span>' + escapeHtml(v.category_name) + '</span>' : '') +
            '<span class="recent-item-time">' + relativeTime(v.viewed_at) + '</span>' +
            '</a>';
        }).join('');
      } catch (err) {
        recentSection.style.display = 'none';
      }
    }

    recentHeader.addEventListener('click', () => {
      recentArrow.classList.toggle('open');
      recentList.classList.toggle('open');
    });

    function relativeTime(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr + 'Z').getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return new Date(dateStr).toLocaleDateString('zh-CN');
    }

    // --- Scroll position memory ---
    const SCROLL_KEY_PREFIX = 'md-viewer-scroll-';
    let scrollSaveTimer = null;

    function getScrollKey() {
      return SCROLL_KEY_PREFIX + (currentCategoryId || 'all');
    }

    function saveScrollPosition() {
      try {
        const key = getScrollKey();
        localStorage.setItem(key, JSON.stringify({
          scrollY: window.scrollY,
          timestamp: Date.now()
        }));
      } catch (e) { /* ignore */ }
    }

    function restoreScrollPosition() {
      try {
        const key = getScrollKey();
        const saved = localStorage.getItem(key);
        if (!saved) return;
        const data = JSON.parse(saved);
        if (Date.now() - data.timestamp > 86400000) {
          localStorage.removeItem(key);
          return;
        }
        requestAnimationFrame(() => {
          window.scrollTo(0, data.scrollY);
        });
      } catch (e) { /* ignore */ }
    }

    window.addEventListener('scroll', () => {
      if (scrollSaveTimer) return;
      scrollSaveTimer = setTimeout(() => {
        saveScrollPosition();
        scrollSaveTimer = null;
      }, 500);
    }, { passive: true });

    // --- Helpers ---
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }
    function formatDate(s) {
      const d = new Date(s);
      return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    // --- Init ---
    window.addEventListener('resize', () => {
      const activeTab = tabBarInner.querySelector('.tab-item.active');
      const underline = document.getElementById('tabUnderline');
      if (!activeTab || !underline) return;
      const innerRect = tabBarInner.getBoundingClientRect();
      const tabRect = activeTab.getBoundingClientRect();
      underline.style.left = (tabRect.left - innerRect.left) + 'px';
      underline.style.width = tabRect.width + 'px';
    });

    (async () => {
      await Promise.all([loadCategories(), loadTags()]);
      await Promise.all([loadDocuments(), loadRecentViews()]);
      restoreScrollPosition();
    })();
  </script>
</body>
</html>
