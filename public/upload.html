<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer - 上传文档</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/upload.css">
  <link rel="stylesheet" href="https://unpkg.com/@iconscout/unicons@latest/css/line.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      padding: 32px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }
    #permPasswordWrap {
      display: none;
      margin-bottom: 16px;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,0.04);
    }
    .upload-area input { display: none; }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-text { color: var(--text-secondary); font-size: 15px; }
    .upload-hint { color: var(--text-secondary); font-size: 12px; margin-top: 8px; opacity: 0.7; }

    .result-card {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }
    .result-card.success {
      display: block;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      color: var(--success);
    }
    .result-card.error {
      display: block;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
    }
    .result-card a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .result-card a:hover {
      text-decoration: underline;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover {
      color: var(--accent);
    }

    /* --- Duplicate modal --- */
    .dup-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .dup-modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .dup-modal {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 420px;
      padding: 24px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .dup-modal-overlay.active .dup-modal {
      transform: scale(1);
    }
    .dup-modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .dup-modal p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .dup-modal-info {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .dup-modal-info strong {
      color: var(--text);
    }
    .dup-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .dup-modal-actions button {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      transition: all 0.15s;
    }
    .dup-modal-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .dup-modal-actions button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .dup-modal-actions button.primary:hover {
      background: var(--accent-hover);
    }
    @media (max-width: 600px) {
      body { padding: 16px; padding-top: 72px; }
      .card { padding: 24px 16px; }
      .upload-area { padding: 36px 16px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">MD Viewer</a>
    <button class="icon-btn" id="themeToggle" title="切换主题"><i class="uil uil-moon"></i></button>
  </nav>

  <div class="card">
    <div class="card-title">上传 Markdown 文档</div>

    <div class="form-group">
      <label for="categorySelect">选择分类</label>
      <select id="categorySelect">
        <option value="">未分类</option>
      </select>
    </div>

    <div class="form-group">
      <label for="docDescription">文档备注</label>
      <textarea id="docDescription" placeholder="添加备注信息（可选）" rows="2"></textarea>
    </div>

    <div class="form-group">
      <label>查看权限</label>
      <div class="permission-options">
        <label class="perm-option">
          <input type="radio" name="viewPermission" value="public" checked>
          <i class="uil uil-globe"></i> 公开
        </label>
        <label class="perm-option">
          <input type="radio" name="viewPermission" value="private">
          <i class="uil uil-lock"></i> 私有
        </label>
        <label class="perm-option">
          <input type="radio" name="viewPermission" value="password">
          <i class="uil uil-key"></i> 密码查看
        </label>
      </div>
    </div>

    <div id="permPasswordWrap" class="form-group">
      <label for="viewPassword">查看密码</label>
      <input type="password" id="viewPassword" placeholder="输入查看密码">
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".md">
      <div class="upload-icon"><i class="uil uil-file-upload"></i></div>
      <div class="upload-text">点击或拖拽文件到此处</div>
      <div class="upload-hint">仅支持 .md 文件，最大 10MB</div>
    </div>

    <div class="result-card" id="result"></div>
  </div>

  <a href="/" class="back-link">返回文档列表</a>

  <!-- Duplicate document modal -->
  <div class="dup-modal-overlay" id="dupModal">
    <div class="dup-modal">
      <h3><i class="uil uil-exclamation-triangle" style="color: var(--danger);"></i> 发现同名文档</h3>
      <p>已存在同名文档，你想如何处理？</p>
      <div class="dup-modal-info" id="dupDocInfo"></div>
      <div class="dup-modal-actions">
        <button id="dupNewBtn">新建文档</button>
        <button class="primary" id="dupUpdateBtn">更新文档</button>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/upload.js"></script>
</body>
</html>
