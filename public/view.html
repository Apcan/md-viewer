<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer - 预览</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      min-height: 100vh;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      transition: background 0.2s, border-color 0.2s;
    }
    .header-content {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      min-height: 36px;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .doc-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-actions {
      display: flex;
      gap: 4px;
    }
    .header-actions .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .header-actions .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .theme-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      font-size: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .markdown-body {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      line-height: 1.8;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s;
    }
    .markdown-body h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.3px;
    }
    .markdown-body h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 32px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .markdown-body h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 24px 0 12px 0;
    }
    .markdown-body h4 {
      font-size: 16px;
      font-weight: 600;
      margin: 20px 0 8px 0;
    }
    .markdown-body p {
      margin: 0 0 16px 0;
    }
    .markdown-body ul, .markdown-body ol {
      margin: 0 0 16px 0;
      padding-left: 24px;
    }
    .markdown-body li {
      margin: 6px 0;
    }
    .markdown-body code {
      background: rgba(99,102,241,0.08);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.9em;
    }
    .markdown-body pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 20px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 0 0 20px 0;
      line-height: 1.6;
    }
    .markdown-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }
    .markdown-body blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding: 8px 16px;
      margin: 0 0 16px 0;
      color: var(--text-secondary);
      background: rgba(99,102,241,0.04);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .markdown-body blockquote p:last-child { margin-bottom: 0; }
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px 0;
      font-size: 14px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }
    .markdown-body th {
      background: var(--bg-card);
      font-weight: 600;
    }
    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .markdown-body img:hover {
      transform: scale(1.02);
    }
    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }
    .markdown-body a:hover {
      text-decoration: underline;
    }
    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .markdown-body input[type="checkbox"] {
      margin-right: 6px;
      accent-color: var(--accent);
    }
    .loading, .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .error { color: var(--danger); }
    /* Skeleton */
    .sk-wrap { padding: 0; }
    .sk-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
    }
    .sk-line { height: 14px; border-radius: 7px; background: var(--border); margin-bottom: 14px; animation: skP 1.5s ease-in-out infinite; }
    .sk-line.w50 { width: 50%; }
    .sk-line.w70 { width: 70%; }
    .sk-line.w90 { width: 90%; }
    .sk-line.h20 { height: 20px; margin-bottom: 20px; width: 40%; }
    .sk-gap { height: 24px; }
    @keyframes skP { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @media (max-width: 600px) {
      .container { padding: 16px 12px 40px; }
      .markdown-body { padding: 20px 16px; }
      .markdown-body h1 { font-size: 22px; }
      .markdown-body h2 { font-size: 18px; }
      .markdown-body h3 { font-size: 16px; }
      .markdown-body pre { padding: 14px; font-size: 12px; }
      .doc-title { font-size: 13px; }
    }

    /* --- Reading progress bar --- */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--accent);
      z-index: 9999;
      transition: width 0.1s linear;
      border-radius: 0 2px 2px 0;
    }
    /* --- Password overlay --- */
    .password-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
    }
    .password-overlay.hidden { display: none; }
    .password-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: 32px;
    }
    .password-card-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: var(--text);
    }
    .password-card-icon {
      text-align: center;
      font-size: 40px;
      margin-bottom: 16px;
    }
    .password-card-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .password-card .form-group {
      margin-bottom: 16px;
    }
    .password-card .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .password-card .form-group input:focus {
      border-color: var(--accent);
    }
    .password-card .form-group input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }
    .password-card .btn-submit {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .password-card .btn-submit:hover {
      background: var(--accent-hover);
    }
    .password-card .btn-submit:active {
      transform: scale(0.98);
    }
    .password-card .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .password-error {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
      font-size: 13px;
      text-align: center;
    }

    /* --- Version badge --- */
    .version-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: oklch(0.55 0.2 265 / 0.1);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .version-badge:hover {
      background: oklch(0.55 0.2 265 / 0.18);
    }

    /* --- Version history panel --- */
    .version-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .version-panel-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .version-panel {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 480px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .version-panel-overlay.active .version-panel {
      transform: scale(1);
    }
    .version-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .version-panel-header h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .version-panel-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .version-panel-close:hover {
      background: var(--bg-card);
    }
    .version-panel-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }
    .version-panel-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
    }
    .version-panel-item:hover {
      background: var(--bg-card);
    }
    .version-panel-item.active {
      background: oklch(0.55 0.2 265 / 0.08);
      color: var(--accent);
    }
    .version-panel-item-version {
      font-size: 13px;
      font-weight: 600;
      min-width: 32px;
    }
    .version-panel-item-info {
      flex: 1;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .version-panel-item-info strong {
      color: var(--text);
      font-weight: 500;
    }
    .version-panel-item-current {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: oklch(0.65 0.17 155 / 0.1);
      color: var(--success);
      font-weight: 500;
      white-space: nowrap;
    }
    .version-panel-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* --- TOC sidebar --- */
    .toc-sidebar {
      position: fixed;
      top: 56px;
      right: 0;
      width: 220px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 20px 16px;
      font-size: 13px;
      border-left: 1px solid var(--border);
      background: var(--bg);
      z-index: 50;
      transition: background 0.2s, border-color 0.2s;
    }
    .toc-sidebar::-webkit-scrollbar { width: 4px; }
    .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .toc-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .toc-list { list-style: none; }
    .toc-item {
      display: block;
      padding: 4px 0 4px 0;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
      line-height: 1.4;
      border-left: 2px solid transparent;
      padding-left: 8px;
      margin-left: 0;
    }
    .toc-item:hover { color: var(--text); }
    .toc-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .toc-item.depth-3 { padding-left: 20px; font-size: 12px; }
    .toc-empty {
      color: var(--text-secondary);
      opacity: 0.6;
      font-size: 12px;
    }

    /* --- TOC mobile toggle --- */
    .toc-mobile-toggle {
      display: none;
      position: fixed;
      bottom: 72px;
      right: 20px;
      z-index: 200;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    .toc-mobile-panel {
      display: none;
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 90;
      max-height: 50vh;
      overflow-y: auto;
      padding: 16px 20px;
    }
    /* Overlay behind TOC mobile panel */
    .toc-mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 89;
    }
    .toc-mobile-overlay.show { display: block; }
    /* When header is hidden (external link preview), adjust TOC panel top */
    body.no-header .toc-mobile-panel { top: 0; }

    /* --- Serif headings --- */
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      font-family: 'Noto Serif SC', 'Songti SC', Georgia, serif;
    }

    /* --- Code block language label --- */
    .markdown-body pre {
      position: relative;
    }
    .markdown-body pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 11px;
      color: oklch(0.65 0.05 260);
      opacity: 0.6;
      pointer-events: none;
      text-transform: uppercase;
      font-family: var(--font-sans);
    }

    /* --- Table zebra stripes --- */
    .markdown-body table tr:nth-child(even) {
      background: oklch(0.5 0 0 / 0.03);
    }
    html.dark .markdown-body table tr:nth-child(even) {
      background: oklch(1 0 0 / 0.03);
    }

    /* --- Image lightbox --- */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .lightbox-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      cursor: default;
    }

    /* --- Responsive TOC --- */
    @media (max-width: 1100px) {
      .toc-sidebar { display: none; }
      .toc-mobile-toggle { display: flex; }
      .toc-mobile-panel.show { display: block; }
      .container { max-width: 100%; padding-right: 20px; }
    }
    @media (max-width: 600px) {
      .toc-mobile-panel { padding: 12px 16px; }
    }

    /* --- Print enhancements --- */
    @media print {
      .header, .theme-float, .toc-sidebar, .toc-mobile-toggle { display: none !important; }
      .markdown-body { border: none; box-shadow: none; padding: 0; max-width: 100%; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        font-family: 'Noto Serif SC', Georgia, serif;
        break-after: avoid;
      }
      .markdown-body pre { break-inside: avoid; }
      .markdown-body table { break-inside: avoid; }
      .markdown-body img { max-width: 100% !important; }
      body { background: white; color: black; }
      .container { padding: 0; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="reading-progress" id="readingProgress"></div>

  <div class="header" id="header">
    <div class="header-content">
      <a href="/" class="back-btn">← 返回</a>
      <div class="doc-title" id="docTitle">加载中...</div>
      <span class="version-badge" id="versionBadge" style="display:none" title="点击查看版本历史"></span>
      <div class="header-actions">
        <button class="icon-btn" id="exportHtmlBtn" title="导出 HTML">⬇</button>
        <button class="icon-btn" id="printBtn" title="打印">🖨</button>
      </div>
    </div>
  </div>
  <button class="icon-btn theme-float" id="themeToggle" title="切换主题"></button>

  <!-- Password overlay -->
  <div class="password-overlay hidden" id="passwordOverlay">
    <div class="password-card">
      <div class="password-card-icon">🔑</div>
      <div class="password-card-title">此文档需要密码查看</div>
      <div class="password-card-hint">请输入查看密码以访问文档内容</div>
      <form id="passwordForm">
        <div class="form-group">
          <input type="password" id="viewPasswordInput" placeholder="输入查看密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit" id="passwordSubmitBtn">验证密码</button>
      </form>
      <div class="password-error" id="passwordError"></div>
    </div>
  </div>

  <div class="container">
    <div class="markdown-body sk-wrap" id="content">
      <div class="sk-block">
        <div class="sk-line h20"></div>
        <div class="sk-line w90"></div>
        <div class="sk-line w70"></div>
        <div class="sk-line w90"></div>
        <div class="sk-gap"></div>
        <div class="sk-line w90"></div>
        <div class="sk-line w50"></div>
        <div class="sk-gap"></div>
        <div class="sk-line w70"></div>
        <div class="sk-line w90"></div>
      </div>
    </div>
  </div>

  <!-- TOC sidebar -->
  <aside class="toc-sidebar" id="tocSidebar">
    <div class="toc-title">目录</div>
    <ul class="toc-list" id="tocList"></ul>
  </aside>
  <button class="toc-mobile-toggle" id="tocMobileToggle">📑</button>
  <div class="toc-mobile-overlay" id="tocMobileOverlay"></div>
  <div class="toc-mobile-panel" id="tocMobilePanel">
    <ul class="toc-list" id="tocMobileList"></ul>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- Version history panel -->
  <div class="version-panel-overlay" id="versionPanel">
    <div class="version-panel">
      <div class="version-panel-header">
        <h3>版本历史</h3>
        <button class="version-panel-close" id="versionPanelClose">&times;</button>
      </div>
      <ul class="version-panel-list" id="versionPanelList">
        <li class="version-panel-empty">加载中...</li>
      </ul>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script src="/js/view.js"></script>
</body>
</html>
